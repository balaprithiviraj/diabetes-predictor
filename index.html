<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .input-transition {
            transition: all 0.3s ease;
        }
        .input-transition:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }
        .result-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-morphism w-full max-w-md p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-blue-100 rounded-full mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Diabetes Risk Assessment</h1>
            <p class="text-gray-600">Enter your health metrics to assess diabetes risk</p>
        </div>

        <!-- Input Form -->
        <div class="space-y-6 mb-8">
            <!-- Glucose Input -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <span class="flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.83c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                        </svg>
                        Glucose Level (mg/dL)
                    </span>
                </label>
                <input type="number" id="glucose" min="0" max="300" step="1" value="120" 
                    class="input-transition w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                <p class="text-xs text-gray-500 mt-1">Normal range: 70-140 mg/dL</p>
            </div>

            <!-- BMI Input -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <span class="flex items-center">
                        <svg class="w-5 h-5 mr-2 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"></path>
                        </svg>
                        BMI (Body Mass Index)
                    </span>
                </label>
                <input type="number" id="bmi" min="10" max="60" step="0.1" value="25.5" 
                    class="input-transition w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none">
                <p class="text-xs text-gray-500 mt-1">Healthy range: 18.5-24.9</p>
            </div>

            <!-- Age Input -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <span class="flex items-center">
                        <svg class="w-5 h-5 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Age (years)
                    </span>
                </label>
                <input type="number" id="age" min="0" max="120" step="1" value="45" 
                    class="input-transition w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none">
                <p class="text-xs text-gray-500 mt-1">Age 45+ increases risk</p>
            </div>
        </div>

        <!-- Predict Button -->
        <button id="predictBtn" onclick="predictDiabetes()" 
            class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold py-4 px-6 rounded-lg hover:from-blue-700 hover:to-purple-700 transform hover:scale-105 transition-all duration-300 shadow-lg hover:shadow-xl mb-6">
            <span class="flex items-center justify-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
                Calculate Risk
            </span>
        </button>

        <!-- Result Card -->
        <div id="resultContainer" class="hidden">
            <div class="result-card bg-gradient-to-br from-gray-50 to-white rounded-xl p-6 border-2 border-blue-100">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-700">Assessment Result</h3>
                    <div id="riskBadge" class="px-3 py-1 rounded-full text-sm font-medium bg-yellow-100 text-yellow-800">
                        Analyzing...
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">Diabetes Risk</p>
                        <p id="result" class="text-3xl font-bold text-gray-800">--</p>
                    </div>
                    <div id="riskIcon" class="text-4xl">
                        ⚕️
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-gray-200">
                    <p id="riskMessage" class="text-sm text-gray-600">
                        Enter your values and click Calculate Risk
                    </p>
                </div>
            </div>
        </div>

        <!-- Loading Spinner (hidden by default) -->
        <div id="loadingSpinner" class="hidden text-center py-4">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
            <p class="text-gray-600 mt-2">Analyzing your data...</p>
        </div>

        <!-- Error Message (hidden by default) -->
        <div id="errorMessage" class="hidden mt-4 bg-red-50 border-l-4 border-red-500 p-4 rounded">
            <div class="flex items-center">
                <svg class="w-5 h-5 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p id="errorText" class="text-red-700 text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'diabetes-predictor-production-5df6.up.railway.app';

        async function predictDiabetes() {
            // Get input values
            const glucose = document.getElementById('glucose').value;
            const bmi = document.getElementById('bmi').value;
            const age = document.getElementById('age').value;

            // Validate inputs
            if (!glucose || !bmi || !age) {
                showError('Please fill in all fields');
                return;
            }

            if (glucose <= 0 || bmi <= 0 || age <= 0) {
                showError('Please enter positive values');
                return;
            }

            // Show loading, hide previous results/errors
            document.getElementById('loadingSpinner').classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('predictBtn').disabled = true;
            document.getElementById('predictBtn').classList.add('opacity-75', 'cursor-not-allowed');

            try {
                // Prepare request data
                const requestData = {
                    glucose: parseFloat(glucose),
                    bmi: parseFloat(bmi),
                    age: parseInt(age)
                };

                // Make API call
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Display result with appropriate styling
                displayResult(data.result);
                
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to connect to the server. Please try again.');
            } finally {
                // Hide loading, re-enable button
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('predictBtn').disabled = false;
                document.getElementById('predictBtn').classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        function displayResult(result) {
            const resultContainer = document.getElementById('resultContainer');
            const resultElement = document.getElementById('result');
            const riskBadge = document.getElementById('riskBadge');
            const riskIcon = document.getElementById('riskIcon');
            const riskMessage = document.getElementById('riskMessage');

            // Format result (assuming result is a number between 0 and 1 or a percentage)
            let formattedResult = result;
            let riskLevel = '';
            let riskColor = '';
            let icon = '';
            let message = '';

            if (typeof result === 'number') {
                // If result is between 0 and 1 (probability)
                if (result <= 1) {
                    formattedResult = (result * 100).toFixed(1) + '%';
                    
                    if (result < 0.3) {
                        riskLevel = 'Low Risk';
                        riskColor = 'bg-green-100 text-green-800';
                        icon = '✅';
                        message = 'Your risk level is low. Maintain a healthy lifestyle!';
                    } else if (result < 0.6) {
                        riskLevel = 'Moderate Risk';
                        riskColor = 'bg-yellow-100 text-yellow-800';
                        icon = '⚠️';
                        message = 'Moderate risk detected. Consider consulting a healthcare provider.';
                    } else {
                        riskLevel = 'High Risk';
                        riskColor = 'bg-red-100 text-red-800';
                        icon = '🔴';
                        message = 'High risk detected. Please consult a healthcare provider promptly.';
                    }
                } else {
                    // If result is already a percentage or other number
                    formattedResult = result + (result > 1 ? '%' : '');
                }
            } else {
                // If result is a string (like "Diabetic" or "Not Diabetic")
                formattedResult = result;
                if (result.toLowerCase().includes('diabet')) {
                    riskLevel = 'Positive';
                    riskColor = 'bg-red-100 text-red-800';
                    icon = '🔴';
                    message = 'Diabetes detected. Please consult a healthcare provider.';
                } else {
                    riskLevel = 'Negative';
                    riskColor = 'bg-green-100 text-green-800';
                    icon = '✅';
                    message = 'No diabetes detected. Maintain your healthy habits!';
                }
            }

            // Update UI
            resultElement.textContent = formattedResult;
            riskBadge.textContent = riskLevel || 'Result';
            riskBadge.className = `px-3 py-1 rounded-full text-sm font-medium ${riskColor}`;
            riskIcon.textContent = icon || '⚕️';
            riskMessage.textContent = message || 'Risk assessment completed based on your inputs.';
            
            resultContainer.classList.remove('hidden');
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            
            // Auto-hide error after 5 seconds
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                predictDiabetes();
            }
        });

        // Add input validation on the fly
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', function() {
                if (this.value < 0) this.value = 0;
                if (this.id === 'glucose' && this.value > 300) this.value = 300;
                if (this.id === 'bmi' && this.value > 60) this.value = 60;
                if (this.id === 'age' && this.value > 120) this.value = 120;
            });
        });
    </script>
</body>
</html>
